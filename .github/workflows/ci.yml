name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CI: true
      TEST_BROWSER_DRIVER: puppeteer
      TMPDIR: ${{ runner.temp }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache Meteor packages
        uses: actions/cache@v4
        with:
          path: ~/.meteor
          key: ${{ runner.os }}-meteor-${{ hashFiles('.meteor/release', '.meteor/versions') }}

      - name: Install Meteor
        run: |
          curl https://install.meteor.com/ | sh
          echo "$HOME/.meteor" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: meteor npm ci

      - name: Run tests
        run: npm test -- --port 3100
