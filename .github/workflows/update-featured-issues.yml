name: Update featured issues in README

on:
  push:
    branches:
      - main
  issues:
    types:
      - opened
      - edited
      - labeled
      - unlabeled
      - closed
      - reopened
  workflow_dispatch:

permissions:
  contents: write
  issues: read

concurrency:
  group: update-featured-issues-readme
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate README block from open featured issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const readmePath = 'README.md';

            const START = '<!-- featured-issues:start -->';
            const END = '<!-- featured-issues:end -->';

            const categoryOrder = ['ui/ux', 'tests', 'core', 'channels'];

            function escapeRegex(str) {
              return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            function normalizeGroupName(name) {
              return name.trim();
            }

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            const filtered = issues
              .filter(issue => !issue.pull_request)
              .filter(issue => {
                const labels = issue.labels.map(l => typeof l === 'string' ? l : l.name);
                return labels.includes('featured');
              })
              .map(issue => {
                const labels = issue.labels
                  .map(l => typeof l === 'string' ? l : l.name)
                  .filter(Boolean);

                const categoryLabels = labels.filter(l => l !== 'featured');

                if (categoryLabels.length === 0) {
                  return null;
                }

                return {
                  title: issue.title.trim(),
                  url: issue.html_url,
                  number: issue.number,
                  category: normalizeGroupName(categoryLabels[0])
                };
              })
              .filter(Boolean);

            const grouped = new Map();

            for (const item of filtered) {
              if (!grouped.has(item.category)) {
                grouped.set(item.category, []);
              }
              grouped.get(item.category).push(item);
            }

            const sortedCategories = [
              ...categoryOrder.filter(c => grouped.has(c)),
              ...[...grouped.keys()]
                .filter(c => !categoryOrder.includes(c))
                .sort((a, b) => a.localeCompare(b))
            ];

            let block = '';

            if (sortedCategories.length === 0) {
              block = '_No featured issues right now._';
            } else {
              const chunks = [];

              for (const category of sortedCategories) {
                const items = grouped.get(category)
                  .sort((a, b) => a.number - b.number)
                  .map(item => `- [#${item.number} ${item.title}](${item.url})`)
                  .join('\n');

                chunks.push(`### ${category}\n\n${items}`);
              }

              block = chunks.join('\n\n');
            }

            if (!fs.existsSync(readmePath)) {
              core.setFailed(`README.md not found at ${readmePath}`);
              return;
            }

            let readme = fs.readFileSync(readmePath, 'utf8');

            const startIndex = readme.indexOf(START);
            const endIndex = readme.indexOf(END);

            if (startIndex === -1 || endIndex === -1 || endIndex < startIndex) {
              core.setFailed(
                `README.md must contain markers:\n${START}\nand\n${END}`
              );
              return;
            }

            const before = readme.slice(0, startIndex + START.length);
            const after = readme.slice(endIndex);

            const newReadme = `${before}\n\n${block}\n\n${after}`;
            fs.writeFileSync(readmePath, newReadme, 'utf8');

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- README.md; then
            echo "No changes in README.md"
            exit 0
          fi

          git add README.md
          git commit -m "docs: update featured issues list"
          git push