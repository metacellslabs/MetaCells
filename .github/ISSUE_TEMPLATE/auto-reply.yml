name: Auto reply to issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  reply:
    runs-on: ubuntu-latest

    steps:
      - name: Comment on new issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `
Thanks for opening this issue.

This project is maintained in spare time.

Issues are usually reviewed **once per week**, so please don't expect an immediate response.

If this is a bug, please make sure reproduction steps are included.
`
            })